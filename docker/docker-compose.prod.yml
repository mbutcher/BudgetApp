# Single-container production deployment.
# Uses SQLite by default (no external database required).
# For MariaDB or PostgreSQL, set DB_CLIENT in secrets/production/.env.
# SSL and external routing are handled by Nginx Proxy Manager (or any reverse proxy).
# Point your proxy at http://<host>:${APP_PORT:-13911}

services:
  budget_app:
    build:
      context: ../
      dockerfile: docker/Dockerfile
      args:
        - VITE_API_URL=/api/v1
    container_name: budget_app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-13911}:80"
    volumes:
      - /mnt/user/appdata/budget-app/logs:/app/logs
      - /mnt/user/appdata/budget-app/uploads:/app/uploads
      - /mnt/user/appdata/budget-app/data:/app/data  # SQLite database file (DB_CLIENT=sqlite3)
    env_file:
      - ../secrets/production/.env
    secrets:
      - db_password
      - jwt_secret
      - encryption_key
      - password_pepper
      - master_secret
      - backup_encryption_key
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

secrets:
  db_password:
    file: ../secrets/production/db_password.txt
  jwt_secret:
    file: ../secrets/production/jwt_secret.txt
  encryption_key:
    file: ../secrets/production/encryption_key.txt
  password_pepper:
    file: ../secrets/production/password_pepper.txt
  master_secret:
    file: ../secrets/production/master_secret.txt
  backup_encryption_key:
    file: ../secrets/production/backup_encryption_key.txt
