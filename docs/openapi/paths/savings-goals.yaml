components:
  schemas:
    SavingsGoal:
      type: object
      required: [id, userId, accountId, name, targetAmount, createdAt, updatedAt]
      properties:
        id:           { type: string, format: uuid }
        userId:       { type: string, format: uuid }
        accountId:    { type: string, format: uuid }
        name:         { type: string }
        targetAmount: { type: number, minimum: 0 }
        targetDate:   { type: ['string', 'null'], format: date }
        budgetLineId: { type: ['string', 'null'], format: uuid, description: "Optional linked budget line. Its scheduled contribution amount drives the projected completion date." }
        createdAt:    { type: string, format: date-time }
        updatedAt:    { type: string, format: date-time }

    SavingsGoalProgress:
      type: object
      properties:
        goalId:          { type: string, format: uuid }
        name:            { type: string }
        currentAmount:   { type: number }
        targetAmount:    { type: number }
        percentComplete: { type: number, minimum: 0, maximum: 100 }
        daysToGoal:      { type: ['integer', 'null'] }
        projectedDate:   { type: ['string', 'null'], format: date }

    CreateSavingsGoalRequest:
      type: object
      required: [accountId, name, targetAmount]
      properties:
        accountId:    { type: string, format: uuid }
        name:         { type: string, maxLength: 255 }
        targetAmount: { type: number, minimum: 0 }
        targetDate:   { type: string, format: date }
        budgetLineId: { type: ['string', 'null'], format: uuid }

    UpdateSavingsGoalRequest:
      type: object
      properties:
        name:         { type: string, maxLength: 255 }
        targetAmount: { type: number, minimum: 0 }
        targetDate:   { type: ['string', 'null'], format: date }
        budgetLineId: { type: ['string', 'null'], format: uuid }

paths:
  /savings-goals:
    get:
      summary: List savings goals
      tags: [Analytics]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Savings goal list
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [success] }
                  data:
                    type: object
                    properties:
                      savingsGoals:
                        type: array
                        items: { $ref: '#/components/schemas/SavingsGoal' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }

    post:
      summary: Create a savings goal
      tags: [Analytics]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateSavingsGoalRequest' }
      responses:
        '201':
          description: Savings goal created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [success] }
                  data:
                    type: object
                    properties:
                      savingsGoal: { $ref: '#/components/schemas/SavingsGoal' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /savings-goals/{id}:
    get:
      summary: Get a savings goal
      tags: [Analytics]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Savings goal details
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [success] }
                  data:
                    type: object
                    properties:
                      savingsGoal: { $ref: '#/components/schemas/SavingsGoal' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '404': { $ref: '#/components/responses/NotFoundError' }

    patch:
      summary: Update a savings goal
      tags: [Analytics]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateSavingsGoalRequest' }
      responses:
        '200':
          description: Updated savings goal
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [success] }
                  data:
                    type: object
                    properties:
                      savingsGoal: { $ref: '#/components/schemas/SavingsGoal' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '404': { $ref: '#/components/responses/NotFoundError' }

    delete:
      summary: Delete a savings goal
      tags: [Analytics]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Savings goal deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [success] }
                  data: { type: 'null' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '404': { $ref: '#/components/responses/NotFoundError' }

  /savings-goals/{id}/progress:
    get:
      summary: Get savings goal progress
      description: Returns current balance vs target, percent complete, and projected completion date. If a budget line is linked, the projected date is computed from the line's scheduled monthly contribution rate; otherwise it is derived from the target date.
      tags: [Analytics]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Savings goal progress
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [success] }
                  data:
                    type: object
                    properties:
                      progress: { $ref: '#/components/schemas/SavingsGoalProgress' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
