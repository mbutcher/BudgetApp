components:
  schemas:
    Budget:
      type: object
      required: [id, userId, name, startDate, endDate, isActive, createdAt, updatedAt]
      properties:
        id:        { type: string, format: uuid }
        userId:    { type: string, format: uuid }
        name:      { type: string }
        startDate: { type: string, format: date }
        endDate:   { type: string, format: date }
        isActive:  { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    BudgetCategory:
      type: object
      required: [id, budgetId, categoryId, allocatedAmount]
      properties:
        id:              { type: string, format: uuid }
        budgetId:        { type: string, format: uuid }
        categoryId:      { type: string, format: uuid }
        allocatedAmount: { type: number }
        createdAt:       { type: string, format: date-time }
        updatedAt:       { type: string, format: date-time }

    BudgetCategoryProgress:
      type: object
      properties:
        category:  { $ref: '#/components/schemas/Category' }
        allocated: { type: number }
        spent:     { type: number }
        remaining: { type: number }

    BudgetProgress:
      type: object
      properties:
        budget:          { $ref: '#/components/schemas/Budget' }
        categories:
          type: array
          items: { $ref: '#/components/schemas/BudgetCategoryProgress' }
        totalAllocated:  { type: number }
        totalSpent:      { type: number }
        totalRemaining:  { type: number }

    CreateBudgetRequest:
      type: object
      required: [name, startDate, endDate]
      properties:
        name:      { type: string, maxLength: 255 }
        startDate: { type: string, format: date }
        endDate:   { type: string, format: date }

    UpdateBudgetRequest:
      type: object
      properties:
        name:      { type: string, maxLength: 255 }
        startDate: { type: string, format: date }
        endDate:   { type: string, format: date }
        isActive:  { type: boolean }

    BudgetCategoryEntry:
      type: object
      required: [categoryId, allocatedAmount]
      properties:
        categoryId:      { type: string, format: uuid }
        allocatedAmount: { type: number, minimum: 0 }

paths:
  /budgets:
    get:
      summary: List budgets
      tags: [Budgets]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Budget list
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [success] }
                  data:
                    type: object
                    properties:
                      budgets:
                        type: array
                        items: { $ref: '#/components/schemas/Budget' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }

    post:
      summary: Create a budget
      tags: [Budgets]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateBudgetRequest' }
      responses:
        '201':
          description: Budget created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [success] }
                  data:
                    type: object
                    properties:
                      budget: { $ref: '#/components/schemas/Budget' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /budgets/{id}:
    get:
      summary: Get budget with progress
      tags: [Budgets]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Budget with spending progress
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [success] }
                  data:
                    type: object
                    properties:
                      budget: { $ref: '#/components/schemas/BudgetProgress' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '404': { $ref: '#/components/responses/NotFoundError' }

    patch:
      summary: Update a budget
      tags: [Budgets]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateBudgetRequest' }
      responses:
        '200':
          description: Updated budget
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [success] }
                  data:
                    type: object
                    properties:
                      budget: { $ref: '#/components/schemas/Budget' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '404': { $ref: '#/components/responses/NotFoundError' }

    delete:
      summary: Delete a budget
      tags: [Budgets]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Budget deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [success] }
                  data: { type: 'null' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '404': { $ref: '#/components/responses/NotFoundError' }

  /budgets/{id}/categories:
    put:
      summary: Replace budget category allocations
      description: Replaces ALL category allocations for the budget with the provided list. Omitted categories are removed.
      tags: [Budgets]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [categories]
              properties:
                categories:
                  type: array
                  items: { $ref: '#/components/schemas/BudgetCategoryEntry' }
      responses:
        '200':
          description: Allocations updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [success] }
                  data:
                    type: object
                    properties:
                      categories:
                        type: array
                        items: { $ref: '#/components/schemas/BudgetCategory' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
